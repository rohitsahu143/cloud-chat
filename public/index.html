<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Chat | Pro</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #dadbd3; display: flex; height: 100vh; overflow: hidden; }

        /* LOGIN */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #00a884; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 320px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 12px; background: #00a884; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* SIDEBAR */
        .sidebar { width: 30%; background: #111b21; color: white; display: flex; flex-direction: column; border-right: 1px solid #2a3942; }
        .my-profile { padding: 15px; background: #202c33; display: flex; justify-content: space-between; color: #00a884; font-weight: bold; }
        .contact-item { display: flex; align-items: center; gap: 12px; padding: 15px; border-bottom: 1px solid #2a3942; cursor: pointer; }
        .contact-item:hover { background: #2a3942; }
        .contact-item.active { background: #374248; }
        .contact-item img { width: 45px; height: 45px; border-radius: 50%; }

        /* CHAT */
        .chat-container { flex: 1; display: flex; flex-direction: column; background: #efeae2; }
        .chat-header { background: #202c33; color: white; padding: 10px 15px; display: flex; align-items: center; gap: 15px; }
        .chat-header img { width: 40px; height: 40px; border-radius: 50%; }
        .header-tools { margin-left: auto; display: flex; gap: 15px; align-items: center; }
        .tool-icon { cursor: pointer; font-size: 18px; color: #aebac1; transition: 0.2s; }
        .tool-icon:hover { color: #ff5c5c; }

        /* MESSAGES */
        .messages-display { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .bubble { max-width: 65%; padding: 8px 12px; border-radius: 8px; margin: 4px 0; font-size: 14.5px; position: relative; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .sent { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .bubble.selected { border-color: #00a884; background: #e7fce3; }
        .timestamp { font-size: 10px; color: #667781; text-align: right; margin-top: 4px; }

        /* DELETE BAR */
        #multi-delete-bar { background: #00a884; color: white; padding: 10px 20px; display: none; justify-content: space-between; align-items: center; }

        .input-area { background: #f0f2f5; padding: 15px; display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border: none; border-radius: 8px; outline: none; }
        .input-area button { background: #00a884; color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2>Cloud Chat Login</h2>
        <input type="text" id="userIn" placeholder="Username" autocomplete="off">
        <input type="password" id="passIn" placeholder="Password">
        <button onclick="attemptLogin()">Login</button>
    </div>
</div>

<div class="sidebar">
    <div class="my-profile"><span id="meDisplay"></span><span onclick="location.reload()" style="cursor:pointer;color:#aaa;font-size:12px">Logout</span></div>
    <div class="contacts-list" id="contacts"></div>
</div>

<div class="chat-container">
    <div id="multi-delete-bar">
        <span id="select-count">0 messages selected</span>
        <div>
            <button onclick="cancelSelection()" style="background:none; border:1px solid white; color:white; padding:5px 10px; cursor:pointer; margin-right:5px;">Cancel</button>
            <button onclick="deleteSelected()" style="background:white; border:none; color:#ea0038; padding:5px 10px; cursor:pointer; font-weight:bold;">Delete</button>
        </div>
    </div>

    <div class="chat-header">
        <img id="headerImg" src="" style="display:none;">
        <span id="headerName">Select a friend</span>
        <div class="header-tools" id="headerTools" style="display:none;">
            <span class="tool-icon" onclick="clearAllChat()" title="Clear All Chat">🗑️</span>
        </div>
    </div>

    <div class="messages-display" id="msgBox"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type a message..." disabled>
        <button id="sendBtn" onclick="doSend()" disabled>Send</button>
    </div>
</div>

<script>
    const userDB = { "Rohit": "123", "Ravi": "123", "Sachin": "123", "Kamna": "123", "Mahi": "123" };
    let loggedInUser = "";
    let targetUser = "";
    let selectedMessages = []; // Stores timestamps of selected messages

    function attemptLogin() {
        const u = document.getElementById("userIn").value.trim();
        const p = document.getElementById("passIn").value;
        if (userDB[u] === p) {
            loggedInUser = u;
            document.getElementById("login-overlay").style.display = "none";
            document.getElementById("meDisplay").innerText = "Me: " + u;
            loadSidebar();
        } else { alert("Wrong credentials"); }
    }

    function loadSidebar() {
        const list = document.getElementById("contacts");
        list.innerHTML = "";
        Object.keys(userDB).forEach((name, index) => {
            if (name === loggedInUser) return;
            const div = document.createElement("div");
            div.className = "contact-item";
            div.id = "c-" + name;
            div.onclick = () => openConversation(name, index + 1);
            div.innerHTML = `<img src="https://i.pravatar.cc/40?img=${index + 1}"><span>${name}</span>`;
            list.appendChild(div);
        });
    }

    function openConversation(name, imgId) {
        targetUser = name;
        cancelSelection();
        document.getElementById("headerName").innerText = name;
        document.getElementById("headerImg").src = `https://i.pravatar.cc/40?img=${imgId}`;
        document.getElementById("headerImg").style.display = "block";
        document.getElementById("headerTools").style.display = "flex";
        document.getElementById("msgInput").disabled = false;
        document.getElementById("sendBtn").disabled = false;
        document.querySelectorAll('.contact-item').forEach(i => i.classList.remove('active'));
        document.getElementById("c-" + name).classList.add('active');
        refreshMessages();
    }

    function doSend() {
        const input = document.getElementById("msgInput");
        const val = input.value.trim();
        if (!val) return;
        const allMsgs = JSON.parse(localStorage.getItem("cloud_chat_v5")) || [];
        allMsgs.push({
            id: Date.now() + Math.random(), // Unique ID for deletion
            sender: loggedInUser, receiver: targetUser, text: val,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        });
        localStorage.setItem("cloud_chat_v5", JSON.stringify(allMsgs));
        input.value = "";
        refreshMessages();
    }

    function refreshMessages() {
        if (!targetUser) return;
        const allMsgs = JSON.parse(localStorage.getItem("cloud_chat_v5")) || [];
        const box = document.getElementById("msgBox");
        box.innerHTML = "";
        const convo = allMsgs.filter(m => (m.sender === loggedInUser && m.receiver === targetUser) || (m.sender === targetUser && m.receiver === loggedInUser));
        
        convo.forEach(m => {
            const div = document.createElement("div");
            div.className = `bubble ${m.sender === loggedInUser ? 'sent' : 'received'}`;
            if (selectedMessages.includes(m.id)) div.classList.add('selected');
            
            div.onclick = () => toggleSelect(m.id);
            div.innerHTML = `${m.text}<div class="timestamp">${m.time}</div>`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }

    // --- DELETION LOGIC ---

    function toggleSelect(msgId) {
        if (selectedMessages.includes(msgId)) {
            selectedMessages = selectedMessages.filter(id => id !== msgId);
        } else {
            selectedMessages.push(msgId);
        }
        
        const bar = document.getElementById("multi-delete-bar");
        if (selectedMessages.length > 0) {
            bar.style.display = "flex";
            document.getElementById("select-count").innerText = `${selectedMessages.length} selected`;
        } else {
            bar.style.display = "none";
        }
        refreshMessages();
    }

    function cancelSelection() {
        selectedMessages = [];
        document.getElementById("multi-delete-bar").style.display = "none";
        refreshMessages();
    }

    function deleteSelected() {
        let allMsgs = JSON.parse(localStorage.getItem("cloud_chat_v5")) || [];
        allMsgs = allMsgs.filter(m => !selectedMessages.includes(m.id));
        localStorage.setItem("cloud_chat_v5", JSON.stringify(allMsgs));
        cancelSelection();
    }

    function clearAllChat() {
        if (!confirm(`Wipe all messages with ${targetUser}?`)) return;
        let allMsgs = JSON.parse(localStorage.getItem("cloud_chat_v5")) || [];
        allMsgs = allMsgs.filter(m => !((m.sender === loggedInUser && m.receiver === targetUser) || (m.sender === targetUser && m.receiver === loggedInUser)));
        localStorage.setItem("cloud_chat_v5", JSON.stringify(allMsgs));
        refreshMessages();
    }

    document.addEventListener("keypress", (e) => {
        if (e.key === "Enter") { loggedInUser ? doSend() : attemptLogin(); }
    });
    window.addEventListener("storage", refreshMessages);
</script>
</body>
</html>
