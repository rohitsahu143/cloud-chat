
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud Chat</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #dadbd3;
    display: flex;
    height: 100vh;
}

/* LOGIN */
#login-overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #00a884;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-card {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}

.login-card input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    padding: 10px;
    width: 100%;
    background: #00a884;
    color: white;
    border: none;
    cursor: pointer;
}

/* CHAT */
.sidebar {
    width: 30%;
    background: #111b21;
    color: white;
}

.contacts-list {
    overflow-y: auto;
}

.contact-item {
    padding: 10px;
    cursor: pointer;
}

.chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.messages-display {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.input-area {
    display: flex;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-overlay">
    <div class="login-card">
        <h2>Login</h2>

        <input id="userIn" placeholder="Email">
        <input id="passIn" type="password" placeholder="Password">

        <button onclick="attemptLogin()">Login</button>

        <p style="font-size:13px;">
            Don't have account?
            <span style="color:blue;cursor:pointer;" onclick="goRegister()">Register</span>
        </p>

        <div id="error-msg" style="color:red;display:none;">Invalid login</div>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <div id="meDisplay">Not logged in</div>
    <div id="contacts" class="contacts-list"></div>
</div>

<!-- CHAT -->
<div class="chat-container">
    <div id="headerName">Select user</div>
    <div id="msgBox" class="messages-display"></div>

    <div class="input-area">
        <input id="msgInput" placeholder="Type message..." disabled>
        <button onclick="sendMsg()" id="sendBtn" disabled>Send</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let loggedInUser = "";
let targetUser = "";

// 🔥 LOGIN (REAL)
async function attemptLogin() {

    const email = document.getElementById("userIn").value;
    const password = document.getElementById("passIn").value;

    const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.status === 200) {
        loggedInUser = data.user.name;

        document.getElementById("login-overlay").style.display = "none";
        document.getElementById("meDisplay").innerText = "Me: " + loggedInUser;

        loadUsers();
    } else {
        document.getElementById("error-msg").style.display = "block";
    }
}

// 🔥 LOAD USERS FROM DB
async function loadUsers() {

    const res = await fetch("/api/users");
    const users = await res.json();

    const list = document.getElementById("contacts");
    list.innerHTML = "";

    users.forEach((u, i) => {

        if (u.name === loggedInUser) return;

        const div = document.createElement("div");
        div.className = "contact-item";

        div.innerText = u.name;

        div.onclick = () => openChat(u.name);

        list.appendChild(div);
    });
}

// OPEN CHAT
function openChat(name) {
    targetUser = name;

    document.getElementById("headerName").innerText = name;

    document.getElementById("msgInput").disabled = false;
    document.getElementById("sendBtn").disabled = false;

    socket.emit("load messages", {
        me: loggedInUser,
        friend: targetUser
    });
}

// SEND MESSAGE
function sendMsg() {

    const input = document.getElementById("msgInput");
    const text = input.value;

    if (!text) return;

    const msg = {
        sender: loggedInUser,
        receiver: targetUser,
        text: text,
        time: new Date().toLocaleTimeString()
    };

    socket.emit("chat message", msg);

    input.value = "";
}

// RECEIVE MESSAGE
socket.on("chat message", (data) => {

    if (!targetUser) return;

    if (
        (data.sender === loggedInUser && data.receiver === targetUser) ||
        (data.sender === targetUser && data.receiver === loggedInUser)
    ) {
        const box = document.getElementById("msgBox");

        const div = document.createElement("div");
        div.innerText = data.sender + ": " + data.text;

        box.appendChild(div);
    }
});

// LOAD HISTORY
socket.on("chat history", (msgs) => {

    const box = document.getElementById("msgBox");
    box.innerHTML = "";

    msgs.forEach(m => {
        const div = document.createElement("div");
        div.innerText = m.sender + ": " + m.text;
        box.appendChild(div);
    });
});

// REGISTER PAGE REDIRECT
function goRegister() {
    window.location.href = "/register.html";
}
</script>

</body>
</html>
